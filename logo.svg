<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a0dad;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9b30ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8d5ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Logo Icon Background Circle -->
  <circle cx="50" cy="50" r="44" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff22" stroke-width="1.5"/>

  <!-- Open Book -->
  <path d="M20 62 Q50 48 80 62 L80 38 Q50 24 20 38 Z" fill="url(#bookGrad)" opacity="0.95"/>
  <!-- Book spine line -->
  <line x1="50" y1="46" x2="50" y2="64" stroke="#6a0dad" stroke-width="2" stroke-linecap="round"/>
  <!-- Book pages lines left -->
  <line x1="28" y1="50" x2="47" y2="44" stroke="#6a0dad" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="55" x2="47" y2="50" stroke="#6a0dad" stroke-width="1" opacity="0.4"/>
  <!-- Book pages lines right -->
  <line x1="72" y1="50" x2="53" y2="44" stroke="#6a0dad" stroke-width="1" opacity="0.4"/>
  <line x1="72" y1="55" x2="53" y2="50" stroke="#6a0dad" stroke-width="1" opacity="0.4"/>

  <!-- Flame / Diya lamp -->
  <ellipse cx="50" cy="28" rx="5" ry="7" fill="url(#flameGrad)" filter="url(#glow)"/>
  <ellipse cx="50" cy="31" rx="3" ry="4.5" fill="#ffcc00"/>
  <ellipse cx="50" cy="33" rx="1.5" ry="2.5" fill="#fff"/>
  <!-- Lamp base -->
  <ellipse cx="50" cy="36" rx="6" ry="2.5" fill="#ffd700" opacity="0.85"/>

  <!-- Stars decoration -->
  <circle cx="22" cy="28" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="78" cy="28" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="16" cy="42" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="84" cy="42" r="1" fill="#fff" opacity="0.5"/>

  <!-- Brand Text: VEDA -->
  <text x="108" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="900"
        fill="url(#bgGrad)" letter-spacing="3">VEDA</text>

  <!-- Brand Text: LEARNING -->
  <text x="110" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600"
        fill="#555" letter-spacing="8">LEARNING</text>

  <!-- Underline accent -->
  <rect x="108" y="73" width="175" height="3" rx="2" fill="url(#bgGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="110" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="400"
        fill="#9b30ff" letter-spacing="2">KNOWLEDGE · GROWTH · SUCCESS</text>
</svg>
